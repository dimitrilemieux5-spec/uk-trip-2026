<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UK Trip — Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f0f2f5; }
    h2 { margin-bottom: 6px; }
    p  { color: #6b7280; margin-bottom: 20px; }
    canvas { display: block; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    button { padding: 10px 20px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-right: 10px; }
    button:hover { background: #283593; }
  </style>
</head>
<body>
  <h2>UK Trip 2026 — Icon Generator</h2>
  <p>Click each button to download the icon at the correct size, then move both files into your project folder.</p>

  <canvas id="preview" width="192" height="192"></canvas>

  <button onclick="download(192)">Download icon-192.png</button>
  <button onclick="download(512)">Download icon-512.png</button>

  <script>
    function drawIcon(canvas, size) {
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const r = size * 0.18;

      // Rounded rect background
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#1a237e';
      ctx.fill();

      // "UK" text
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.round(size * 0.44)}px Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('UK', size / 2, size * 0.56);

      // "2026" subtext
      ctx.fillStyle = '#90caf9';
      ctx.font = `${Math.round(size * 0.155)}px Georgia, serif`;
      ctx.fillText('2026', size / 2, size * 0.78);
    }

    // Draw preview on load
    drawIcon(document.getElementById('preview'), 192);

    function download(size) {
      const canvas = document.createElement('canvas');
      drawIcon(canvas, size);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
